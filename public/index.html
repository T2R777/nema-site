  :root{
    --bg:#070810;
    --card:#11131d;
    --card-hover:#191c2a;

    --text:#ffffff;
    --dim:#9aa0b5;

    --cyan:#00E5FF;
    --violet:#7C3AED;
    --pink:#FF2E63;
    --gold:#FFD700;

    --border:#24273a;
}


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


html{
    scroll-behavior:smooth;
}


body{
    background:
    radial-gradient(circle at top,
    rgba(124,58,237,.25),
    transparent 40%),
    var(--bg);

    color:var(--text);

    font-family:'Space Grotesk',sans-serif;

    overflow-x:hidden;
}


/* ========= TOP BAR ========= */


.topbar{
    background:linear-gradient(
    90deg,
    var(--cyan),
    var(--violet)
    );

    color:black;

    text-align:center;

    font-weight:700;

    padding:10px;

    font-size:.9rem;
}


.topbar span{
    margin:0 15px;
}



/* ========= NAV ========= */


nav{

    position:sticky;

    top:0;

    z-index:100;

    background:rgba(7,8,16,.7);

    backdrop-filter:blur(12px);

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:20px 8%;
}


.logo{

    font-family:'Rajdhani',sans-serif;

    font-size:1.8rem;

    font-weight:700;

}


.logo span{
    color:var(--cyan);
}


.nav-links{
    display:flex;
    gap:30px;
}


.nav-links a{

    color:var(--dim);

    text-decoration:none;

    transition:.3s;
}


.nav-links a:hover{
    color:white;
}



.nav-btn,
.main-btn,
.buy-button,
.choose-btn{

    background:
    linear-gradient(
    135deg,
    var(--cyan),
    var(--violet)
    );

    color:black;

    border:none;

    padding:15px 30px;

    border-radius:12px;

    font-weight:700;

    cursor:pointer;

    transition:.3s;

    text-decoration:none;

    display:inline-block;
}


.nav-btn:hover,
.main-btn:hover,
.buy-button:hover,
.choose-btn:hover{

    transform:
    translateY(-4px);

    box-shadow:
    0 0 30px
    var(--violet);
}



/* ========= HERO ========= */


.hero{

    display:grid;

    grid-template-columns:
    1fr 1fr;

    align-items:center;

    gap:60px;

    padding:
    90px 8%;
}


.badge{

    background:
    rgba(0,229,255,.15);

    border:
    1px solid var(--cyan);

    color:var(--cyan);

    width:max-content;

    padding:
    8px 16px;

    border-radius:50px;

    margin-bottom:25px;
}


.hero h1{

    font-size:4.5rem;

    line-height:1;
}


.hero h1 span{

    background:
    linear-gradient(
    90deg,
    var(--cyan),
    var(--violet)
    );

    -webkit-background-clip:text;

    color:transparent;
}


.hero p{

    color:var(--dim);

    font-size:1.1rem;

    margin:
    25px 0 35px;

    max-width:500px;
}


/* STATS */


.hero-stats{

    display:flex;

    gap:40px;

    margin-top:45px;
}


.hero-stats h3{

    color:var(--cyan);

    font-size:1.8rem;
}


.hero-stats p{
    color:var(--dim);
}
  /* ========= APERÇU TAPIS ========= */

.preview {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:25px;
}


.mousepad {

    width:500px;
    height:330px;

    background:
    url("assets/rocket-mousepad.jpg");

    background-size:cover;
    background-position:center;

    border-radius:25px;

    position:relative;

    overflow:hidden;

    animation:float 5s ease-in-out infinite;

    box-shadow:
    0 30px 60px rgba(0,0,0,.6);
}


@keyframes float {

    0%,100%{
        transform:
        rotate(-2deg)
        translateY(0);
    }

    50%{
        transform:
        rotate(2deg)
        translateY(-15px);
    }
}



.pseudo-preview {

    position:absolute;

    bottom:35px;

    width:100%;

    text-align:center;

    font-family:"Rajdhani";

    font-size:2.6rem;

    font-weight:700;

    color:var(--cyan);

    text-shadow:
    0 0 15px var(--cyan),
    0 0 40px var(--cyan);
}



/* CONFIGURATEUR */


.configurator {

    background:var(--card);

    width:100%;

    max-width:500px;

    padding:25px;

    border-radius:20px;

    border:1px solid var(--border);
}


.configurator input {

    width:100%;

    background:#070810;

    border:1px solid var(--border);

    color:white;

    padding:15px;

    border-radius:12px;

    font-size:1rem;
}


.colors {

    display:flex;

    gap:15px;

    margin-top:15px;
}


.color {

    width:35px;

    height:35px;

    border-radius:50%;

    border:none;

    cursor:pointer;

    transition:.3s;
}


.color:hover,
.color.active {

    transform:scale(1.2);

    box-shadow:
    0 0 20px white;
}



/* PRODUITS */


.products,
.reviews,
.faq,
#commande {

    padding:100px 8%;
}


.section-title {

    text-align:center;

    margin-bottom:60px;
}


.section-title span {

    color:var(--cyan);

    text-transform:uppercase;

    letter-spacing:3px;
}


.section-title h2 {

    font-size:3rem;

    margin:15px 0;
}



.product-grid,
.review-grid,
.faq-grid,
.advantages {

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:25px;
}



.product-card,
.review,
.faq-card,
.adv,
.order-box {

    background:var(--card);

    border:1px solid var(--border);

    border-radius:20px;

    padding:25px;

    transition:.3s;
}


.product-card:hover,
.review:hover,
.faq-card:hover {

    transform:translateY(-10px);

    border-color:var(--cyan);
}
  footer{

padding:60px 8%;
text-align:center;
border-top:1px solid var(--border);

}


.footer-logo{

font-size:2rem;
font-family:"Rajdhani";
font-weight:700;

}


.footer-logo span{

color:var(--cyan);

}


.footer-links{

margin:30px 0;

display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;

}


.footer-links a{

color:var(--dim);
text-decoration:none;

.copyright{

<body>
  <script>

const pseudoInput =
document.getElementById("pseudoInput");

const preview =
document.getElementById("pseudoPreview");


// Mise à jour du pseudo

pseudoInput.addEventListener("input", ()=>{

preview.innerText =
pseudoInput.value.toUpperCase();

});




// Couleurs néon


const colors =
document.querySelectorAll(".color");


colors.forEach(btn=>{


btn.addEventListener("click",()=>{


colors.forEach(c=>
c.classList.remove("active")
);


btn.classList.add("active");


let color =
btn.dataset.color;


preview.style.color=color;


preview.style.textShadow =
`
0 0 15px ${color},
0 0 40px ${color}
`;


});


});




// Boutons choisir modèle


const buttons =
document.querySelectorAll(".choose-btn");


const select =
document.getElementById("modelSelect");


buttons.forEach(btn=>{


btn.onclick=()=>{


select.value =
btn.dataset.price;


document
.getElementById("commande")
.scrollIntoView({

behavior:"smooth"

});


};


});




// Confirmation commande


const buy =
document.getElementById("buyBtn");


buy.onclick=()=>{


alert(
"🚀 Merci ! Ton PSEUDOPAD est en préparation."
);


};



</script>
